plugins {
    id 'com.android.application'
}

android {
    namespace "org.microg.gms.assistant"
    compileSdk 35
    buildToolsVersion "34.0.0"

    defaultConfig {
        applicationId "app.revanced.android.gms.assistant"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "AssistantDismiss-${variant.versionName}.apk"
        }
    }
}
